<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- T-shirt body -->
  <path d="M120 80 L80 100 L40 140 L80 180 L100 160 L100 340 L300 340 L300 160 L320 180 L360 140 L320 100 L280 80 L260 100 C240 120 160 120 140 100 Z" 
        fill="url(#shirtGrad)" 
        stroke="#64748b" 
        stroke-width="3"/>
  
  <!-- Collar -->
  <path d="M140 100 C160 120 240 120 260 100" 
        fill="none" 
        stroke="#64748b" 
        stroke-width="3"/>
  
  <!-- RGC Lettering -->
  <text x="200" y="240" 
        font-family="Arial Black, Arial, sans-serif" 
        font-size="72" 
        font-weight="900" 
        fill="#475569" 
        text-anchor="middle" 
        letter-spacing="8">RGC</text>
  
  <!-- Subtle shadow effect -->
  <text x="202" y="242" 
        font-family="Arial Black, Arial, sans-serif" 
        font-size="72" 
        font-weight="900" 
        fill="#334155" 
        text-anchor="middle" 
        letter-spacing="8" 
        opacity="0.3">RGC</text>
</svg>
