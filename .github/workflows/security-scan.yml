name: Security Scan (Gitleaks, Trivy, Semgrep)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    name: Run Vulnerability Checks
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload SARIF results
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Gitleaks: Catch secrets
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Semgrep: Generate SARIF for GitHub Security Dashboard
      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/default"
          generateSarif: "1"
        continue-on-error: true # Let SARIF upload handle the reporting

      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

      # 3. Trivy: Generate SARIF for dependency/FS vulnerabilities
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()
          
      # 4. Supplemental NPM Audit
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
      - name: NPM Audit
        run: npm audit --audit-level=critical
